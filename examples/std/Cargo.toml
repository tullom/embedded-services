[workspace]

[package]
name = "std-examples"
version = "0.1.0"
edition = "2024"

[workspace.lints.rust]
warnings = "deny"

[package.metadata.cargo-machete]
ignored = ["critical-section"]

[lints]
workspace = true

[dependencies]
embassy-sync = { version = "0.8.0", features = ["log", "std"] }
embassy-time = { version = "0.5.0", features = ["log", "std"] }
embassy-executor = { version = "0.10.0", features = [
    "platform-std",
    "executor-thread",
    "log",
] }

defmt = "0.3"

embedded-usb-pd = { git = "https://github.com/OpenDevicePartnership/embedded-usb-pd" }
embedded-services = { path = "../../embedded-service", features = ["log"] }
odp-service-common = { path = "../../odp-service-common" }
power-policy-service = { path = "../../power-policy-service", features = [
    "log",
] }
power-policy-interface = { path = "../../power-policy-interface", features = [
    "log",
] }
cfu-service = { path = "../../cfu-service", features = ["log"] }
embedded-cfu-protocol = { git = "https://github.com/OpenDevicePartnership/embedded-cfu" }

battery-service = { path = "../../battery-service", features = ["log", "mock"] }
type-c-service = { path = "../../type-c-service", features = ["log"] }
type-c-interface = { path = "../../type-c-interface", features = ["log"] }

thermal-service = { path = "../../thermal-service", features = ["log", "mock"] }
thermal-service-interface = { path = "../../thermal-service-interface" }

env_logger = "0.11.8"
log = "0.4.14"
static_cell = "2"

critical-section = { version = "1.1", features = ["std"] }

debug-service = { path = "../../debug-service" }
debug-service-messages = { path = "../../debug-service-messages" }

embedded-batteries-async = "0.3"

[lib]
name = "std_examples"
path = "src/lib/lib.rs"

[[bin]]
name = "debug"
path = "src/bin/debug.rs"

[[bin]]
name = "type-c-basic"
path = "src/bin/type_c/basic.rs"

[[bin]]
name = "type-c-service"
path = "src/bin/type_c/service.rs"

[[bin]]
name = "type-c-unconstrained"
path = "src/bin/type_c/unconstrained.rs"

[[bin]]
name = "type-c-ucsi"
path = "src/bin/type_c/ucsi.rs"

# Needed otherwise cargo will pull from git
[patch."https://github.com/OpenDevicePartnership/embedded-services"]
embedded-services = { path = "../../embedded-service" }
