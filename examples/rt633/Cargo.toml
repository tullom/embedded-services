[workspace]

[package]
name = "rt633-examples"
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.lints.rust]
warnings = "deny"

[package.metadata.cargo-machete]
ignored = ["cortex-m", "cortex-m-rt"]

[lints]
workspace = true

[dependencies]
cortex-m = { version = "0.7.7", features = [
    "inline-asm",
    "critical-section-single-core",
] }
cortex-m-rt = "0.7.3"
defmt = "0.3.6"
defmt-rtt = "0.4.0"
panic-probe = { version = "0.3.1", features = ["print-defmt"] }
embassy-imxrt = { git = "https://github.com/OpenDevicePartnership/embassy-imxrt", features = [
    "defmt",
    "time-driver-os-timer",
    "time",
    "mimxrt633s",
    "unstable-pac",
] }

embassy-sync = { version = "0.8", features = ["defmt"] }
embassy-executor = { version = "0.10.0", features = [
    "platform-cortex-m",
    "executor-thread",
    "executor-interrupt",
    "defmt",
] }
embassy-time = { version = "0.5.0", features = [
    "defmt",
    "defmt-timestamp-uptime",
] }
mimxrt600-fcb = "0.2.0"
espi-service = { path = "../../espi-service", features = ["defmt"] }
embedded-services = { path = "../../embedded-service", features = ["defmt"] }
power-policy-interface = { path = "../../power-policy-interface", features = [
    "defmt",
] }


battery-service = { path = "../../battery-service", features = ["defmt"] }
embedded-batteries-async = { version = "0.3", features = ["defmt"] }
bq25773 = { git = "https://github.com/OpenDevicePartnership/bq25773" }
bq40z50-rx = { version = "0.8", features = ["r5"] }
static_cell = "2.1.0"
embassy-embedded-hal = { version = "0.6.0", default-features = false }

# Needed otherwise cargo will pull from git
[patch."https://github.com/OpenDevicePartnership/embedded-services"]
embedded-services = { path = "../../embedded-service" }
