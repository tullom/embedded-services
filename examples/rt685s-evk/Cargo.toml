[workspace]

[package]
name = "rt685s-evk-example"
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.lints.rust]
warnings = "deny"

[package.metadata.cargo-machete]
ignored = ["cortex-m", "cortex-m-rt"]

[lints]
workspace = true

[dependencies]
cortex-m = { version = "0.7.7", features = [
    "inline-asm",
    "critical-section-single-core",
] }
cortex-m-rt = "0.7.3"
crc = "3.2.1"
defmt = "0.3.6"
defmt-rtt = "0.4.0"
panic-probe = { version = "0.3.1", features = ["print-defmt"] }
embassy-imxrt = { git = "https://github.com/OpenDevicePartnership/embassy-imxrt", features = [
    "defmt",
    "time-driver-os-timer",
    "time",
    "mimxrt685s",
] }

embassy-embedded-hal = { version = "0.6.0", features = ["defmt"] }

embassy-sync = { version = "0.8", features = ["defmt"] }
embassy-executor = { version = "0.10.0", features = [
    "platform-cortex-m",
    "executor-thread",
    "executor-interrupt",
    "defmt",
] }
embassy-futures = "0.1.2"
embassy-time = { version = "0.5.0", features = [
    "defmt",
    "defmt-timestamp-uptime",
] }
mimxrt600-fcb = "0.1.0"

embedded-cfu-protocol = { git = "https://github.com/OpenDevicePartnership/embedded-cfu" }
embedded-services = { path = "../../embedded-service", features = ["defmt"] }
odp-service-common = { path = "../../odp-service-common" }
power-button-service = { path = "../../power-button-service", features = [
    "defmt",
] }
power-policy-interface = { path = "../../power-policy-interface", features = [
    "defmt",
] }
power-policy-service = { path = "../../power-policy-service", features = [
    "defmt",
] }
tps6699x = { git = "https://github.com/OpenDevicePartnership/tps6699x", features = [
    "defmt",
    "embassy",
] }
embedded-usb-pd = { git = "https://github.com/OpenDevicePartnership/embedded-usb-pd", default-features = false, features = [
    "defmt",
] }
type-c-service = { path = "../../type-c-service", features = ["defmt"] }
type-c-interface = { path = "../../type-c-interface", features = ["defmt"] }
time-alarm-service = { path = "../../time-alarm-service", features = ["defmt"] }
time-alarm-service-interface = { path = "../../time-alarm-service-interface", features = [
    "defmt",
] }
time-alarm-service-relay = { path = "../../time-alarm-service-relay", features = [
    "defmt",
] }

static_cell = "2.1.0"

platform-service = { path = "../../platform-service", features = [
    "defmt",
    "imxrt685",
] }
embedded-mcu-hal = "0.2.0"

cfu-service = { path = "../../cfu-service", features = ["defmt"] }

# Needed otherwise cargo will pull from git
[patch."https://github.com/OpenDevicePartnership/embedded-services"]
embedded-services = { path = "../../embedded-service" }
